name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  # Required so linuxdeploy / appimagetool work without FUSE on the runner
  APPIMAGE_EXTRACT_AND_RUN: 1

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgtk-3-dev libfuse2 patchelf libmad0 imagemagick

      - name: Install packaging tools
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build release binary
        run: cargo build --release -p dvd2chd-gui
        # build.rs copies tools/linux/* → target/release/tools/ automatically

      # ── .tar.gz ──────────────────────────────────────────────────────────────
      - name: Package tar.gz
        run: |
          TAG=${{ github.ref_name }}
          VER=${TAG#v}
          DIST="dvd2chd-${TAG}-linux-x86_64"
          mkdir -p "$DIST"
          cp target/release/dvd2chd-gui            "$DIST/"
          cp -r target/release/tools               "$DIST/tools"
          cp dvd2chd-gui/packaging/dvd2chd-gui.desktop "$DIST/"
          cp dvd2chd-gui/assets/icon.png           "$DIST/dvd2chd.png"
          cp BUNDLED_TOOLS.md                      "$DIST/"
          cp LICENSE                               "$DIST/"
          tar czf "${DIST}.tar.gz" "$DIST"
          echo "VER=$VER" >> "$GITHUB_ENV"

      # ── .deb (Debian / Ubuntu / CachyOS-deb) ─────────────────────────────────
      - name: Build .deb
        run: cargo deb -p dvd2chd-gui --no-build

      # ── .rpm (Fedora / openSUSE / RHEL) ──────────────────────────────────────
      - name: Build .rpm
        run: cargo generate-rpm -p dvd2chd-gui

      # ── AppImage (universal Linux) ────────────────────────────────────────────
      - name: Download linuxdeploy + GTK plugin
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh

      - name: Build AppImage
        env:
          DEPLOY_GTK_VERSION: 3
        run: |
          # AppImage contains only the GUI binary.
          # Tools (chdman, cdrdao, ddrescue) must be installed system-wide;
          # the bundled pre-built binaries are Arch-compiled and not portable
          # enough to link against Ubuntu runner libs.
          mkdir -p AppDir/usr/bin

          cp target/release/dvd2chd-gui         AppDir/usr/bin/
          mkdir -p AppDir/usr/share/doc/dvd2chd
          cp BUNDLED_TOOLS.md                   AppDir/usr/share/doc/dvd2chd/
          cp LICENSE                            AppDir/usr/share/doc/dvd2chd/

          convert dvd2chd-gui/assets/icon.png -resize 256x256 AppDir/dvd2chd.png
          cp dvd2chd-gui/packaging/dvd2chd-gui.desktop   AppDir/
          sed -i 's|^Exec=.*|Exec=dvd2chd-gui|' AppDir/dvd2chd-gui.desktop

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin gtk \
            --desktop-file AppDir/dvd2chd-gui.desktop \
            --icon-file AppDir/dvd2chd.png \
            --output appimage

          # Normalise filename regardless of what linuxdeploy chose
          find . -maxdepth 1 -name '*.AppImage' ! -name 'linuxdeploy*' \
            -exec mv {} "dvd2chd-${{ github.ref_name }}-linux-x86_64.AppImage" \;

      # ── PKGBUILD (Arch Linux / CachyOS / Manjaro) ────────────────────────────
      - name: Generate PKGBUILD
        run: |
          TARBALL="dvd2chd-${{ github.ref_name }}-linux-x86_64.tar.gz"
          SHA256=$(sha256sum "$TARBALL" | awk '{print $1}')
          sed \
            -e "s/__VERSION__/${{ env.VER }}/g" \
            -e "s|__REPO__|${{ github.repository }}|g" \
            -e "s/__SHA256__/${SHA256}/g" \
            dvd2chd-gui/packaging/PKGBUILD.template > PKGBUILD

      # ── Collect artifacts into a flat directory ─────────────────────────────
      - name: Flatten artifacts
        run: |
          mkdir -p artifacts
          cp dvd2chd-*-linux-x86_64.tar.gz  artifacts/
          cp dvd2chd-*-linux-x86_64.AppImage artifacts/
          cp target/debian/*.deb             artifacts/
          cp target/generate-rpm/*.rpm       artifacts/
          cp PKGBUILD                        artifacts/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: artifacts/*

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target\
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --release -p dvd2chd-gui

      - name: Package zip
        shell: bash
        run: |
          TAG=${{ github.ref_name }}
          DIST="dvd2chd-${TAG}-windows-x86_64"
          mkdir -p "$DIST"
          cp target/release/dvd2chd-gui.exe "$DIST/"
          cp BUNDLED_TOOLS.md               "$DIST/"
          cp LICENSE                        "$DIST/"
          7z a "${DIST}.zip" "$DIST"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dvd2chd-*-windows-x86_64.zip

  # ── Create GitHub Release from all artifacts ───────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DVD2CHD ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dvd2chd-*-linux-x86_64.tar.gz
            dvd2chd-*-linux-x86_64.AppImage
            *.deb
            *.rpm
            PKGBUILD
            dvd2chd-*-windows-x86_64.zip
